name: Briefing Semanal - Hipótese Capital

on:
  # Roda toda segunda-feira às 8h (horário de Brasília = 11h UTC)
  schedule:
    - cron: "0 11 * * 1"
  # Permite rodar manualmente pelo GitHub
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  gerar-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restaurar banco de dados histórico
        uses: actions/cache/restore@v4
        with:
          path: data/briefing.db
          key: briefing-db-${{ github.run_id }}
          restore-keys: |
            briefing-db-

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Criar .env com secrets
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> .env

      - name: Rodar o briefing (modo não-interativo)
        run: |
          # Alimenta "G" no stdin para pular o menu interativo
          echo "G" | python src/main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Salvar banco de dados histórico no cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/briefing.db
          key: briefing-db-${{ github.run_id }}

      - name: Commit e push do dashboard atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/output/index.html data/output/
          git diff --staged --quiet || git commit -m "Atualiza briefing semanal - $(date +%Y-%m-%d)"
          git push

  # Deploy do dashboard no GitHub Pages
  deploy-pages:
    needs: gerar-briefing
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Upload do dashboard como artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dashboard/output

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
