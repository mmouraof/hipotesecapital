<!-- ─── LAYOUT ─────────────────────────────────────────────────────────── -->
<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-56 bg-white border-r border-gray-200 flex flex-col">
    <div class="px-4 py-5 border-b border-gray-100">
      <h1 class="text-sm font-bold text-gray-800 leading-tight">Hipótese Capital</h1>
      <p class="text-xs text-gray-400 mt-0.5">Briefing Semanal</p>
    </div>
    <nav class="flex-1 overflow-y-auto py-3 px-2" id="sidebar-nav"></nav>
    <div class="px-4 py-3 border-t border-gray-100">
      <p class="text-xs text-gray-400" id="footer-data"></p>
    </div>
  </aside>

  <!-- Conteúdo principal -->
  <main class="flex-1 overflow-y-auto bg-gray-50">
    <div class="max-w-4xl mx-auto px-6 py-8" id="main-content">
      <p class="text-gray-400 text-sm">Selecione um ativo na barra lateral.</p>
    </div>
  </main>

</div>

<script>
  // ─── Utilitários ───────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function badgeClass(sentimento) {
    if (sentimento === "positivo") return "bg-green-100 text-green-800 border border-green-300";
    if (sentimento === "negativo") return "bg-red-100 text-red-800 border border-red-300";
    return "bg-gray-100 text-gray-600 border border-gray-300";
  }

  function fmt(val) {
    if (val === null || val === undefined) return '<span class="text-gray-400">—</span>';
    return `<span>${val}</span>`;
  }

  // ─── Renderiza sidebar ─────────────────────────────────────────────────
  function buildSidebar(tickers, ativoAtivo) {
    const nav = $("sidebar-nav");
    nav.innerHTML = "";
    tickers.forEach(ticker => {
      const btn = document.createElement("button");
      btn.textContent = ticker;
      btn.dataset.ticker = ticker;
      const base = "w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors mb-0.5 ";
      btn.className = base + (ticker === ativoAtivo
        ? "bg-indigo-50 text-indigo-700"
        : "text-gray-600 hover:bg-gray-100");
      btn.addEventListener("click", () => renderAtivo(ticker));
      nav.appendChild(btn);
    });
  }

  // ─── Renderiza conteúdo de um ativo ────────────────────────────────────
  function renderAtivo(ticker) {
    const ativos = DATA.ativos || DATA; // suporta ambos os formatos
    const d = ativos[ticker];
    if (!d) return;

    buildSidebar(Object.keys(ativos), ticker);

    const analise = d.analise || {};
    const indicadores = d.indicadores || {};
    const noticias = d.noticias || [];

    // Linhas da tabela de indicadores — selecionados pelo LLM
    const indSelecionados = analise.indicadores_selecionados || {};
    const indRows = Object.entries(indSelecionados).map(([k, v]) => `
      <tr class="border-t border-gray-100">
        <td class="py-2 pr-4 text-gray-500 text-sm">${k}</td>
        <td class="py-2 text-sm font-medium">${fmt(v)}</td>
      </tr>`).join("") || `<tr><td class="py-2 text-sm text-gray-400" colspan="2">Sem indicadores disponíveis.</td></tr>`;

    // Notícias com badges
    const noticiasHtml = noticias.length ? noticias.map(n => {
      const sentimento = n.sentimento || "neutro";
      const badge = `<span class="inline-block text-xs px-2 py-0.5 rounded-full font-medium ${badgeClass(sentimento)}">${sentimento}</span>`;
      const justif = n.justificativa ? `<p class="text-xs text-gray-500 mt-1">${n.justificativa}</p>` : "";
      return `
        <li class="py-3 border-b border-gray-100 last:border-0">
          <div class="flex items-start gap-2">
            <div class="flex-1">
              <a href="${n.link}" target="_blank" class="text-sm text-gray-800 hover:text-indigo-600 font-medium leading-snug">${n.titulo}</a>
              ${justif}
              <p class="text-xs text-gray-400 mt-1">${n.fonte || ""} ${n.data_publicacao ? "· " + n.data_publicacao.slice(0,10) : ""}</p>
            </div>
            <div class="shrink-0 pt-0.5">${badge}</div>
          </div>
        </li>`;
    }).join("") : '<li class="py-3 text-sm text-gray-400">Nenhuma notícia encontrada.</li>';

    // Perguntas investigativas
    const perguntas = (analise.perguntas_investigativas || []).map((p, i) => `
      <li class="flex gap-3 py-2">
        <span class="shrink-0 w-5 h-5 rounded-full bg-indigo-100 text-indigo-700 text-xs font-bold flex items-center justify-center mt-0.5">${i+1}</span>
        <p class="text-sm text-gray-700">${p}</p>
      </li>`).join("");

    $("main-content").innerHTML = `
      <!-- Header do ativo -->
      <div class="mb-6">
        <div class="flex items-center gap-3">
          <span class="text-2xl font-bold text-gray-900">${ticker}</span>
          <span class="text-gray-400 text-lg">·</span>
          <span class="text-gray-600 text-lg">${d.nome_empresa}</span>
        </div>
      </div>

      <!-- Grid de cards -->
      <div class="space-y-5">

        <!-- Resumo do negócio -->
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Resumo do Negócio</h2>
          <p class="text-sm text-gray-700 leading-relaxed">${analise.resumo_negocio || "—"}</p>
        </div>

        <!-- Indicadores -->
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Indicadores Fundamentalistas</h2>
          <table class="w-full mb-4">
            <tbody>${indRows}</tbody>
          </table>
          <p class="text-sm text-gray-700 leading-relaxed border-t border-gray-100 pt-4">${analise.interpretacao_indicadores || "—"}</p>
        </div>

        <!-- Notícias -->
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Notícias Recentes</h2>
          <ul>${noticiasHtml}</ul>
        </div>

        <!-- Perguntas investigativas -->
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Perguntas Investigativas</h2>
          <ul class="space-y-1">${perguntas || '<li class="text-sm text-gray-400">—</li>'}</ul>
        </div>

      </div>`;
  }

  // ─── Init ──────────────────────────────────────────────────────────────
  (function init() {
    const ativos = DATA.ativos || DATA;
    const tickers = Object.keys(ativos);

    if (!tickers.length) {
      $("main-content").innerHTML = '<p class="text-gray-400 text-sm">Nenhum dado disponível.</p>';
      return;
    }

    $("footer-data").textContent = DATA.data_geracao
      ? "Gerado em " + DATA.data_geracao
      : "";

    buildSidebar(tickers, tickers[0]);
    renderAtivo(tickers[0]);
  })();
</script>

</body>
</html>
