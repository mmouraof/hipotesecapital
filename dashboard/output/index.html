<script>
  const $ = id => document.getElementById(id);

  // ─── Mobile sidebar ──────────────────────────────────────────────────────
  function openSidebar() {
    $("sidebar").classList.remove("-translate-x-full");
    $("sidebar").classList.add("translate-x-0");
    $("sidebar-overlay").classList.remove("hidden");
  }
  function closeSidebar() {
    $("sidebar").classList.remove("translate-x-0");
    $("sidebar").classList.add("-translate-x-full");
    $("sidebar-overlay").classList.add("hidden");
  }

  // ─── Utilitários ────────────────────────────────────────────────────────
  function badgeClass(sentimento) {
    if (sentimento === "positivo") return "bg-green-100 text-green-800 border border-green-300";
    if (sentimento === "negativo") return "bg-red-100 text-red-800 border border-red-300";
    return "bg-gray-100 text-gray-600 border border-gray-300";
  }

  function semaforoClass(label) {
    if (label === "atrativo") return "bg-green-100 text-green-800 border border-green-300";
    if (label === "cautela")  return "bg-amber-100 text-amber-800 border border-amber-300";
    return "bg-gray-100 text-gray-600 border border-gray-300";
  }

  function fmt(val) {
    if (val === null || val === undefined) return '<span class="text-gray-400">—</span>';
    if (typeof val === "object") return '<span class="text-gray-400">—</span>';
    return `<span>${val}</span>`;
  }

  function noticiaItem(n) {
    const sentimento = n.sentimento || "neutro";
    const badge = `<span class="inline-block text-xs px-2 py-0.5 rounded-full font-medium border ${badgeClass(sentimento)}">${sentimento}</span>`;
    const justif = n.justificativa ? `<p class="text-xs text-gray-500 mt-1">${n.justificativa}</p>` : "";
    const titulo = n.link
      ? `<a href="${n.link}" target="_blank" class="text-sm text-gray-800 hover:text-indigo-600 font-medium leading-snug">${n.titulo}</a>`
      : `<span class="text-sm text-gray-800 font-medium leading-snug">${n.titulo}</span>`;
    const meta = [n.fonte, n.data_publicacao ? String(n.data_publicacao).slice(0, 10) : ""]
      .filter(Boolean).join(" · ");
    return `
      <li class="py-3 border-b border-gray-100 last:border-0">
        <div class="flex items-start gap-2">
          <div class="flex-1">
            ${titulo}
            ${justif}
            ${meta ? `<p class="text-xs text-gray-400 mt-1">${meta}</p>` : ""}
          </div>
          <div class="shrink-0 pt-0.5">${badge}</div>
        </div>
      </li>`;
  }

  // ─── Sidebar ────────────────────────────────────────────────────────────
  function buildSidebar(tickers, ativoAtivo, view) {
    const nav = $("sidebar-nav");
    nav.innerHTML = "";
    const base = "w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors";
    const active = base + " bg-indigo-50 text-indigo-700";
    const inactive = base + " text-gray-500 hover:bg-gray-100";
    $("btn-overview").className  = (!ativoAtivo && view !== "historico") ? active : inactive;
    $("btn-historico").className = (view === "historico") ? active : inactive;
    tickers.forEach(ticker => {
      const btn = document.createElement("button");
      btn.textContent = ticker;
      btn.className = "w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors mb-0.5 " +
        (ticker === ativoAtivo ? "bg-indigo-50 text-indigo-700" : "text-gray-600 hover:bg-gray-100");
      btn.addEventListener("click", () => {
        renderAtivo(ticker);
        if (window.innerWidth < 768) closeSidebar();
      });
      nav.appendChild(btn);
    });
  }

  // ─── Overview ───────────────────────────────────────────────────────────
  function renderOverview() {
    const ativos = DATA.ativos || DATA;
    const tickers = Object.keys(ativos);
    buildSidebar(tickers, null, "overview");

    const rows = tickers.map(ticker => {
      const d = ativos[ticker];
      const analise = d.analise || {};
      const clas = analise.classificacao || {};
      const cotacao = (d.indicadores || {})["Cotação"] || "—";
      const setor = (d.indicadores || {})["Setor"] || "—";
      const resumoTexto = clas.razao || "—";
      const ind = d.indicadores || {};
      const dash = (d.analise || {}).indicadores_dashboard || [];
      function indVal(keys) {
        for (const k of keys) { if (ind[k]) return ind[k]; }
        const re = new RegExp(keys[0].replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "i");
        const found = dash.find(x => re.test(x.label));
        return found ? found.valor : "—";
      }
      const pl = indVal(["P/L"]);
      const dy = indVal(["Div. Yield", "Div.Yield", "DY", "Dividend Yield"]);
      const badge = clas.label
        ? `<span class="inline-block text-xs px-2 py-0.5 rounded-full font-semibold border ${semaforoClass(clas.label)}">${clas.label}</span>`
        : '<span class="text-gray-300 text-xs">—</span>';
      return `
        <tr class="border-t border-gray-100 hover:bg-gray-50 cursor-pointer" onclick="renderAtivo('${ticker}')">
          <td class="py-3 pl-4 pr-3 font-semibold text-indigo-700 text-sm whitespace-nowrap">${ticker}</td>
          <td class="py-3 pr-3 text-sm text-gray-700 whitespace-nowrap">${d.nome_empresa || ""}</td>
          <td class="py-3 pr-3 text-sm text-gray-500 whitespace-nowrap hidden lg:table-cell">${setor}</td>
          <td class="py-3 pr-3 text-sm font-medium text-gray-900 whitespace-nowrap">R$ ${cotacao}</td>
          <td class="py-3 pr-3 text-sm text-gray-700 whitespace-nowrap hidden sm:table-cell">${pl}</td>
          <td class="py-3 pr-3 text-sm text-gray-700 whitespace-nowrap hidden sm:table-cell">${dy}</td>
          <td class="py-3 pr-3">${badge}</td>
          <td class="py-3 pr-4 text-sm text-gray-500 max-w-xs truncate hidden md:table-cell">${resumoTexto}</td>
        </tr>`;
    }).join("");

    $("main-content").innerHTML = `
      <div class="mb-6">
        <h1 class="text-xl font-bold text-gray-900">Visão Geral</h1>
        <p class="text-sm text-gray-400 mt-0.5">Clique em um ativo para ver a análise completa.</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead>
              <tr class="bg-gray-50">
                <th class="pl-4 pr-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Ticker</th>
                <th class="pr-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Empresa</th>
                <th class="pr-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider hidden lg:table-cell">Setor</th>
                <th class="pr-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Cotação</th>
                <th class="pr-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider hidden sm:table-cell">P/L</th>
                <th class="pr-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider hidden sm:table-cell">Div. Yield</th>
                <th class="pr-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Classificação</th>
                <th class="pr-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider hidden md:table-cell">Justificativa</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  // ─── Ativo detalhe ───────────────────────────────────────────────────────
  function renderAtivo(ticker) {
    const ativos = DATA.ativos || DATA;
    const d = ativos[ticker];
    if (!d) return;

    buildSidebar(Object.keys(ativos), ticker);

    const analise = d.analise || {};
    const clas = analise.classificacao || {};
    const indDash = analise.indicadores_dashboard || [];
    const indicadoresBrutos = d.indicadores || {};
    const cotacao = indicadoresBrutos["Cotação"];
    const dataCot = indicadoresBrutos["Data últ cot"];

    // Tabela de indicadores
    const indRows = indDash.map(item => `
      <tr class="border-t border-gray-100">
        <td class="py-2 pr-4 text-gray-500 text-sm">${item.label}</td>
        <td class="py-2 text-sm font-medium">${fmt(item.valor)}</td>
      </tr>`).join("");

    // Interpretação: array de seções ou string legada
    const interp = analise.interpretacao_indicadores;
    let interpHtml;
    if (Array.isArray(interp) && interp.length) {
      interpHtml = interp.map((sec, i) => `
        <div class="${i > 0 ? "border-t border-gray-100 pt-4 mt-4" : ""}">
          <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">${sec.titulo}</h3>
          <p class="text-sm text-gray-700 leading-relaxed">${sec.texto}</p>
        </div>`).join("");
    } else {
      interpHtml = `<p class="text-sm text-gray-700 leading-relaxed">${interp || "—"}</p>`;
    }

    // Notícias da analise.noticias_classificadas (já enriquecidas com link/fonte/data)
    const todasNoticias = analise.noticias_classificadas || [];
    const noticiasRel = todasNoticias.filter(n => n.relevante !== false);
    const noticiasOther = todasNoticias.filter(n => n.relevante === false);

    const noticiasHtml = noticiasRel.length
      ? noticiasRel.map(noticiaItem).join("")
      : '<li class="py-3 text-sm text-gray-400">Nenhuma notícia diretamente relacionada.</li>';

    const outrasHtml = noticiasOther.length ? `
      <details class="mt-3">
        <summary class="cursor-pointer text-xs text-gray-400 hover:text-gray-600 select-none">
          Outras menções (${noticiasOther.length}) — contexto setorial, não diretamente sobre o ativo
        </summary>
        <ul class="mt-2 opacity-50">${noticiasOther.map(noticiaItem).join("")}</ul>
      </details>` : "";

    // Perguntas investigativas
    const perguntas = (analise.perguntas_investigativas || []).map((p, i) => `
      <li class="flex gap-3 py-2">
        <span class="shrink-0 w-5 h-5 rounded-full bg-indigo-100 text-indigo-700 text-xs font-bold flex items-center justify-center mt-0.5">${i + 1}</span>
        <p class="text-sm text-gray-700">${p}</p>
      </li>`).join("");

    // Histórico (tabela resumida)
    const historico = (d.historico || []).slice().sort((a, b) => b.data.localeCompare(a.data));
    let historicoHtml;
    if (!historico.length) {
      historicoHtml = '<p class="text-sm text-gray-400">Primeira execução — histórico será exibido a partir da próxima.</p>';
    } else {
      const histRows = historico.map(h => `
        <tr class="border-t border-gray-100">
          <td class="py-2 pr-4 text-sm text-gray-700 whitespace-nowrap">${h.data}</td>
          <td class="py-2 pr-4 text-sm font-medium whitespace-nowrap">R$ ${h.cotacao}</td>
          <td class="py-2 pr-4 text-sm text-gray-700 whitespace-nowrap">${h.pl}</td>
          <td class="py-2 pr-4 text-sm text-gray-700 whitespace-nowrap">${h.dy}</td>
          <td class="py-2">
            <span class="inline-block text-xs px-2 py-0.5 rounded-full font-semibold border ${semaforoClass(h.classificacao)}">${h.classificacao}</span>
          </td>
        </tr>`).join("");
      historicoHtml = `
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead>
              <tr class="bg-gray-50">
                <th class="pr-4 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Data</th>
                <th class="pr-4 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Cotação</th>
                <th class="pr-4 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">P/L</th>
                <th class="pr-4 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Div. Yield</th>
                <th class="py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Classificação</th>
              </tr>
            </thead>
            <tbody>${histRows}</tbody>
          </table>
        </div>`;
    }

    // Header: cotação + semáforo
    const cotacaoHtml = cotacao
      ? `<div class="ml-auto text-right shrink-0">
           <span class="text-2xl font-bold text-indigo-700">R$ ${cotacao}</span>
           ${dataCot ? `<p class="text-xs text-gray-400 mt-0.5">${dataCot}</p>` : ""}
         </div>`
      : "";

    const semaforoHtml = clas.label
      ? `<span class="inline-block text-xs px-3 py-1 rounded-full font-semibold border ${semaforoClass(clas.label)}">${clas.label}</span>`
      : "";

    $("main-content").innerHTML = `
      <!-- Header -->
      <div class="mb-6">
        <div class="flex items-start gap-3">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="text-2xl font-bold text-gray-900">${ticker}</span>
              <span class="text-gray-400 text-lg">·</span>
              <span class="text-gray-600 text-lg">${d.nome_empresa}</span>
              ${semaforoHtml}
            </div>
            ${clas.razao ? `<p class="text-xs text-gray-500 mt-1">${clas.razao}</p>` : ""}
          </div>
          ${cotacaoHtml}
        </div>
      </div>

      <!-- Cards -->
      <div class="space-y-5">

        <!-- Resumo do negócio -->
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <div class="flex items-center gap-3 mb-3">
            <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Resumo do Negócio</h2>
            ${indicadoresBrutos["Setor"] ? `<span class="text-xs text-gray-400 border border-gray-200 rounded-full px-2 py-0.5">${indicadoresBrutos["Setor"]}</span>` : ""}
          </div>
          <p class="text-sm text-gray-700 leading-relaxed">${analise.resumo_negocio || "—"}</p>
        </div>

        <!-- Indicadores + interpretação -->
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Indicadores Fundamentalistas</h2>
          ${indRows
            ? `<table class="w-full mb-5"><tbody>${indRows}</tbody></table>`
            : '<p class="text-sm text-gray-400 mb-5">Indicadores não disponíveis.</p>'
          }
          <div>${interpHtml}</div>
        </div>

        <!-- Notícias -->
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Notícias Recentes</h2>
          <ul>${noticiasHtml}</ul>
          ${outrasHtml}
        </div>

        <!-- Perguntas investigativas -->
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Perguntas Investigativas</h2>
          <ul class="space-y-1">${perguntas || '<li class="text-sm text-gray-400">—</li>'}</ul>
        </div>

        <!-- Histórico -->
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Histórico</h2>
          ${historicoHtml}
        </div>

      </div>`;
  }

  // ─── Explorador Histórico ─────────────────────────────────────────────────
  let _histTicker = null;   // null = todos
  let _histData   = null;   // null = todas as datas
  let _histSearch = "";     // string de busca livre

  function renderHistorico(tickerFiltro, dataFiltro, searchFiltro) {
    if (tickerFiltro  !== undefined) _histTicker = tickerFiltro  || null;
    if (dataFiltro    !== undefined) _histData   = dataFiltro    || null;
    if (searchFiltro  !== undefined) _histSearch = searchFiltro  || "";

    const ativos    = DATA.ativos || DATA;
    const tickers   = Object.keys(ativos);
    const histComp  = DATA.historico_completo || {};
    const datas     = DATA.datas_disponiveis  || [];

    buildSidebar(tickers, null, "historico");

    // Coleta todas as entradas que batem com os filtros
    let entries = [];
    const dataGeracao = DATA.data_geracao || "";

    // Inclui ativos do dia atual
    for (const ticker of tickers) {
      if (_histTicker && ticker !== _histTicker) continue;
      if (_histData   && dataGeracao !== _histData) continue;
      const ativo = ativos[ticker];
      const ind = ativo.indicadores || {};
      function findInd(keys) { for (const k of keys) { if (ind[k]) return ind[k]; } return "—"; }
      entries.push({
        ticker,
        nome_empresa: ativo.nome_empresa || ticker,
        data: dataGeracao,
        cotacao: ind["Cotação"] || "—",
        classificacao: ((ativo.analise || {}).classificacao || {}).label || "neutro",
        pl: findInd(["P/L"]),
        dy: findInd(["Div. Yield", "Div.Yield", "DY", "Dividend Yield"]),
        indicadores: ind,
        analise: ativo.analise || {},
      });
    }

    // Inclui histórico de execuções anteriores
    for (const ticker of tickers) {
      const snaps = histComp[ticker] || [];
      const nomeEmpresa = (ativos[ticker] || {}).nome_empresa || ticker;
      for (const snap of snaps) {
        if (_histTicker && ticker !== _histTicker) continue;
        if (_histData   && snap.data !== _histData)   continue;
        entries.push({ ticker, nome_empresa: nomeEmpresa, ...snap });
      }
    }

    // Busca livre: ticker, empresa, razão, resumo do negócio
    if (_histSearch) {
      const q = _histSearch.toLowerCase();
      entries = entries.filter(e =>
        e.ticker.toLowerCase().includes(q) ||
        e.nome_empresa.toLowerCase().includes(q) ||
        (e.analise?.classificacao?.razao  || "").toLowerCase().includes(q) ||
        (e.analise?.resumo_negocio        || "").toLowerCase().includes(q)
      );
    }

    // Ordena por data desc, depois ticker
    entries.sort((a, b) => b.data.localeCompare(a.data) || a.ticker.localeCompare(b.ticker));

    // ── Filtros ──────────────────────────────────────────────────────────
    const btnBase = "px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors";
    const btnOn   = btnBase + " bg-indigo-600 text-white border-indigo-600";
    const btnOff  = btnBase + " bg-white text-gray-600 border-gray-200 hover:border-indigo-300";

    const tickerBtns = ["", ...tickers].map(t => {
      const isOn = (_histTicker === null && t === "") || (_histTicker === t);
      return `<button onclick="renderHistorico('${t}',undefined,undefined)" class="${isOn ? btnOn : btnOff}">${t || "Todos"}</button>`;
    }).join("");

    const dataOpts = [`<option value="">Todas as datas</option>`]
      .concat(datas.map(d => `<option value="${d}" ${_histData === d ? "selected" : ""}>${d}</option>`))
      .join("");

    // ── Resultados ───────────────────────────────────────────────────────
    const sem = entries.length !== 1 ? "s" : "";
    const resultadosHtml = entries.length
      ? entries.map(histCard).join("")
      : '<p class="text-sm text-gray-400 py-6 text-center">Nenhum resultado encontrado.</p>';

    $("main-content").innerHTML = `
      <div class="mb-6">
        <h1 class="text-xl font-bold text-gray-900">Explorar Histórico</h1>
        <p class="text-sm text-gray-400 mt-0.5">Consulte análises e indicadores de todas as execuções.</p>
      </div>

      <!-- Filtros -->
      <div class="bg-white rounded-xl border border-gray-200 p-4 mb-5">
        <div class="flex flex-wrap gap-5 items-start">
          <div class="flex-1 min-w-0">
            <p class="text-xs text-gray-400 mb-2 font-medium uppercase tracking-wider">Ticker</p>
            <div class="flex flex-wrap gap-1.5">${tickerBtns}</div>
          </div>
          <div>
            <p class="text-xs text-gray-400 mb-2 font-medium uppercase tracking-wider">Data</p>
            <select onchange="renderHistorico(undefined,this.value,undefined)"
              class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 text-gray-700 bg-white focus:outline-none focus:border-indigo-400">
              ${dataOpts}
            </select>
          </div>
          <div class="w-full">
            <p class="text-xs text-gray-400 mb-2 font-medium uppercase tracking-wider">Busca livre</p>
            <input type="text" id="hist-search" value="${_histSearch}"
              placeholder="Pesquise por ticker, empresa ou texto da análise…"
              oninput="renderHistorico(undefined,undefined,this.value)"
              class="w-full text-sm border border-gray-200 rounded-lg px-3 py-1.5 text-gray-700 focus:outline-none focus:border-indigo-400" />
          </div>
        </div>
      </div>

      <p class="text-xs text-gray-400 mb-3">${entries.length} resultado${sem}</p>
      <div class="space-y-3">${resultadosHtml}</div>`;

    // Restaura foco no campo de busca quando a renderização foi disparada por ele
    if (searchFiltro !== undefined) {
      const inp = $("hist-search");
      if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
    }
  }

  // Renderiza um card de resultado colapsável
  function histCard(entry) {
    const clas  = (entry.analise || {}).classificacao || {};
    const id    = ("h_" + entry.ticker + "_" + entry.data).replace(/[^a-z0-9_]/gi, "_");
    const badge = clas.label
      ? `<span class="inline-block text-xs px-2 py-0.5 rounded-full font-semibold border ${semaforoClass(clas.label)}">${clas.label}</span>`
      : "";

    return `
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <button class="w-full text-left p-4 hover:bg-gray-50 transition-colors focus:outline-none"
                onclick="toggleHistCard('${id}')">
          <div class="flex items-start justify-between gap-3">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="font-semibold text-indigo-700 text-sm">${entry.ticker}</span>
                <span class="text-gray-400 text-xs">·</span>
                <span class="text-gray-600 text-sm">${entry.nome_empresa}</span>
                ${badge}
              </div>
              ${clas.razao ? `<p class="text-xs text-gray-500 mt-1 truncate">${clas.razao}</p>` : ""}
              <div class="flex gap-4 mt-1.5 text-xs text-gray-500">
                <span>R$ ${entry.cotacao}</span>
                <span>P/L ${entry.pl}</span>
                <span>DY ${entry.dy}</span>
              </div>
            </div>
            <div class="text-right shrink-0">
              <p class="text-xs text-gray-400">${entry.data}</p>
              <p class="text-xs text-indigo-400 mt-1" id="${id}-lbl">▼ expandir</p>
            </div>
          </div>
        </button>
        <div id="${id}-detail" class="hidden border-t border-gray-100 p-5">
          ${histDetail(entry)}
        </div>
      </div>`;
  }

  function toggleHistCard(id) {
    const det = $(id + "-detail");
    const lbl = $(id + "-lbl");
    if (det.classList.toggle("hidden")) {
      lbl.textContent = "▼ expandir";
    } else {
      lbl.textContent = "▲ recolher";
    }
  }

  // Conteúdo expandido de um snapshot histórico
  function histDetail(entry) {
    const analise  = entry.analise || {};
    const indDash  = analise.indicadores_dashboard || [];
    const indicadoresBrutos = entry.indicadores || {};

    // Indicadores completos (dados brutos do scraping)
    const indBrutoRows = Object.entries(indicadoresBrutos)
      .filter(([k, v]) => !["Ticker", "Nome", "ticker"].includes(k) && typeof v !== "object")
      .map(([k, v]) => `
        <tr class="border-t border-gray-100">
          <td class="py-1.5 pr-4 text-gray-500 text-xs">${k}</td>
          <td class="py-1.5 text-xs font-medium">${fmt(v)}</td>
        </tr>`).join("");

    // Indicadores selecionados pela IA (dashboard)
    const indDashRows = indDash.map(item => `
      <tr class="border-t border-gray-100">
        <td class="py-1.5 pr-4 text-gray-500 text-xs">${item.label}</td>
        <td class="py-1.5 text-xs font-medium">${fmt(item.valor)}</td>
      </tr>`).join("");

    // Interpretação
    const interp = analise.interpretacao_indicadores;
    let interpHtml;
    if (Array.isArray(interp) && interp.length) {
      interpHtml = interp.map((sec, i) => `
        <div class="${i > 0 ? "border-t border-gray-100 pt-3 mt-3" : ""}">
          <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">${sec.titulo}</h4>
          <p class="text-xs text-gray-700 leading-relaxed">${sec.texto}</p>
        </div>`).join("");
    } else {
      interpHtml = `<p class="text-xs text-gray-700 leading-relaxed">${interp || "—"}</p>`;
    }

    // Notícias
    const noticias = (analise.noticias_classificadas || []).filter(n => n.relevante !== false);
    const notHtml  = noticias.length
      ? noticias.map(noticiaItem).join("")
      : '<li class="py-2 text-xs text-gray-400">Nenhuma notícia relevante.</li>';

    // Perguntas
    const pergs = (analise.perguntas_investigativas || []).map((p, i) => `
      <li class="flex gap-2 py-1.5">
        <span class="shrink-0 w-4 h-4 rounded-full bg-indigo-100 text-indigo-700 text-xs font-bold flex items-center justify-center">${i + 1}</span>
        <p class="text-xs text-gray-700">${p}</p>
      </li>`).join("");

    return `
      <div class="space-y-5">

        <!-- Resumo -->
        <div>
          <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Resumo do Negócio</h3>
          <p class="text-xs text-gray-700 leading-relaxed">${analise.resumo_negocio || "—"}</p>
        </div>

        <!-- Indicadores IA -->
        ${indDashRows ? `
        <div class="border-t border-gray-100 pt-4">
          <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Indicadores Selecionados pela IA</h3>
          <table class="w-full mb-4"><tbody>${indDashRows}</tbody></table>
          ${interpHtml}
        </div>` : ""}

        <!-- Indicadores brutos -->
        ${indBrutoRows ? `
        <details class="border-t border-gray-100 pt-4">
          <summary class="cursor-pointer text-xs text-gray-400 hover:text-gray-600 select-none mb-2">
            Todos os indicadores coletados (${Object.keys(indicadoresBrutos).length})
          </summary>
          <table class="w-full mt-2"><tbody>${indBrutoRows}</tbody></table>
        </details>` : ""}

        <!-- Notícias -->
        <div class="border-t border-gray-100 pt-4">
          <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Notícias</h3>
          <ul>${notHtml}</ul>
        </div>

        <!-- Perguntas -->
        <div class="border-t border-gray-100 pt-4">
          <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Perguntas Investigativas</h3>
          <ul class="space-y-1">${pergs || '<li class="text-xs text-gray-400">—</li>'}</ul>
        </div>

      </div>`;
  }

  // ─── Init ────────────────────────────────────────────────────────────────
  (function init() {
    const ativos = DATA.ativos || DATA;
    const tickers = Object.keys(ativos);

    if (!tickers.length) {
      $("main-content").innerHTML = '<p class="text-gray-400 text-sm">Nenhum dado disponível.</p>';
      return;
    }

    document.title = DATA.data_geracao
      ? "Briefing " + DATA.data_geracao + " — Hipótese Capital"
      : "Hipótese Capital — Briefing Semanal";

    $("footer-data").textContent = DATA.data_geracao
      ? "Gerado em " + DATA.data_geracao
      : "";

    buildSidebar(tickers, null, "overview");
    renderOverview();
  })();
</script>

</body>
</html>
